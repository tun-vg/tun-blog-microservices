syntax = "proto3";

option csharp_namespace = "Shared.Contracts.Protos";

package post;

service PostService {
    rpc GetPost (GetPostRequest) returns (GetPostResponse);
}

message GetPostRequest {
    string postId = 1;
}

message GetPostResponse {
    string postId = 1;
    string authorId = 2;
    string slug = 3;
}