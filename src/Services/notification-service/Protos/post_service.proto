syntax = "proto3";

option csharp_namespace = "NotificationService.Protos";

service PostService {
  rpc GetPost (GetPostRequest) returns (GetPostResponse);
}

message GetPostRequest {
  string post_id = 1;
}

message GetPostResponse {
  string post_id = 1;
  string author_id = 2;
  string slug = 3;
}