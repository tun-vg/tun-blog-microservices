syntax = "proto3";

option csharp_namespace = "Post.Infrastructure.Protos";

service UserService {
  rpc SearchUsers (SearchUsersRequest) returns (SearchUsersResponse);
}

message SearchUsersRequest {
  string name = 1;
}

message SearchUsersResponse {
  repeated User users = 1;
}

message User {
  string user_id = 1;
  string user_name = 2;
  string first_name = 3;
  string last_name = 4;
  string avatar = 5;
}